# BFF — PUBLIC (Vercel reaches it). Safe to be public: the agent verifies
# OTM_PROXY_SECRET, so a request without the secret is rejected downstream.
#   fly deploy --config apps/api/fly.toml apps/api
app = "onthemoney-bff"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
